# Cloudflare Worker 配置模板
# 复制本文件后按自己的 Cloudflare / API 服务修改。
# 不要把真实 account_id、database_id、域名、私有 API 网关或密钥提交到公开仓库。

name = "atri-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
# account_id = "your-cloudflare-account-id"

[vars]
# 推荐使用通用默认值或你自己的代理；真实私有网关不要提交。
OPENAI_API_URL = "https://api.openai.com/v1"
CHAT_API_FORMAT = "openai" # openai | anthropic | gemini
DEFAULT_CHAT_MODEL = "gpt-4o-mini"
AGENT_THINKING_LEVEL = "off" # off | low | medium | high | xhigh | max

DIARY_API_URL = "https://api.openai.com/v1"
DIARY_MODEL = "gpt-4o-mini"

EMBEDDINGS_API_URL = "https://api.openai.com/v1"
EMBEDDINGS_MODEL = "text-embedding-3-small"

# 主动消息（cron 触发，可按需关闭）
PROACTIVE_ENABLED = "false"
PROACTIVE_INTERVAL_MINUTES = "30"
PROACTIVE_TIME_ZONE = "Asia/Shanghai"
PROACTIVE_QUIET_START_HOUR = "23"
PROACTIVE_QUIET_END_HOUR = "7"
PROACTIVE_MAX_DAILY = "5"
PROACTIVE_COOLDOWN_HOURS = "2"
PROACTIVE_INTIMACY_THRESHOLD = "10"
PROACTIVE_RECENT_ACTIVE_MINUTES = "60"
PROACTIVE_NOTIFICATION_CHANNEL = "none"

# 敏感信息请用 wrangler secret 设置，不要写入仓库：
# npx wrangler secret put OPENAI_API_KEY
# npx wrangler secret put DIARY_API_KEY
# npx wrangler secret put EMBEDDINGS_API_KEY
# npx wrangler secret put APP_TOKEN
# npx wrangler secret put ADMIN_API_KEY
# npx wrangler secret put PROACTIVE_NOTIFICATION_TARGET
# npx wrangler secret put EMAIL_API_KEY
# npx wrangler secret put TAVILY_API_KEY

# Tavily 联网搜索（可选）
TAVILY_API_URL = "https://api.tavily.com"

[[vectorize]]
binding = "VECTORIZE"
index_name = "your-vectorize-index"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "your-r2-bucket"
preview_bucket_name = "your-r2-preview-bucket"

[[d1_databases]]
binding = "ATRI_DB"
database_name = "your-d1-database"
database_id = "your-d1-database-id"

[triggers]
crons = ["59 15 * * *", "*/30 * * * *"]

# Custom domain 请在 Cloudflare Dashboard 手动添加，不要把私人域名提交到公开仓库。
